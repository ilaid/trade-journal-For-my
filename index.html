async function loadData(){  
  if(!currentUser)return;  
  const {data,error}=await sb.from("journal_data").select("*").eq("user_id",currentUser).single();  
  if(data){  
    trades=data.trades||[];  
    tags=data.tags||[...ITAGS];  
    dayNotes=data.day_notes||{};  
  }  
}  
  
async function saveData(){  
  if(!currentUser)return;  
  setSaveInd("saving芒聙娄","#4b5563");  
  const {error}=await sb.from("journal_data").upsert({  
    user_id:currentUser,  
    trades,tags,day_notes:dayNotes,  
    updated_at:new Date().toISOString()  
  },{onConflict:"user_id"});  
  if(error){setSaveInd("芒職聽 脳漏脳聮脳聶脳聬脳聰","#ef4444");}  
  else{setSaveInd("芒聹聯 saved","#00c07a");setTimeout(()=>setSaveInd("",""),2000);}

function navMonth(delta){

function monthCalendarDays(){  
  const bd=byDay(),tbd=tradesByDay();  
  const firstDay=new Date(calYear,calMonth,1).getDay();  
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();  
  const todayKey=td();  
  const r=[];  
  for(let i=0;i<firstDay;i++)r.push(null);  
  for(let d=1;d<=daysInMonth;d++){  
    const k=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;  
    r.push({key:k,day:d,pnl:bd[k]??null,count:(tbd[k]||[]).length,isToday:k===todayKey,hasNote:!!(dayNotes[k]?.trim())});  
  }  
  while(r.length%7!==0)r.push(null);  
  return r;  
}

function renderDash(){  
  const now=new Date();  
  const isCurrentMonth=(calYear===now.getFullYear()&&calMonth===now.getMonth());  
  const mKey=`${calYear}-${String(calMonth+1).padStart(2,"0")}`;  
  const mTrades=trades.filter(t=>t.date.startsWith(mKey));  
  const mPnl=mTrades.reduce((s,t)=>s+tPnL(t),0);  
  const mWins=mTrades.filter(t=>tPnL(t)>0).length;  
  const mWr=mTrades.length?Math.round((mWins/mTrades.length)*100):0;  
  const mGW=mTrades.filter(t=>tPnL(t)>0).reduce((s,t)=>s+tPnL(t),0);  
  const mGL=Math.abs(mTrades.filter(t=>tPnL(t)<0).reduce((s,t)=>s+tPnL(t),0));  
  const mPf=mGL>0?(mGW/mGL).toFixed(2):"芒聙聰";  
  const mRRs=mTrades.filter(t=>t.rr);  
  const mAvgRR=mRRs.length?(mRRs.reduce((s,t)=>s+(t.rr||0),0)/mRRs.length).toFixed(2):"芒聙聰";  
  const days=monthCalendarDays();  
  while(days.length%7!==0)days.push(null);  
  
  const calRows=[];  
  for(let i=0;i<days.length;i+=7){  
    const row=days.slice(i,i+7);  
    calRows.push(`<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;">  
    ${row.map(c=>{  
      if(!c)return`<div style="min-height:54px;"></div>`;  
      return`<div onclick="openDayPopup('${c.key}')" style="min-height:54px;padding:6px 4px;border-radius:6px;cursor:pointer;  
        background:${c.pnl!==null?(c.pnl>0?"rgba(0,192,122,.13)":"rgba(239,68,68,.13)"):c.hasNote?"rgba(59,130,246,.07)":"#0d1117"};  
        border:${c.isToday?"2px solid #3b82f6":`1px solid ${c.pnl!==null?(c.pnl>0?"rgba(0,192,122,.3)":"rgba(239,68,68,.3)"):c.hasNote?"rgba(59,130,246,.3)":"#1e2635"}`};  
        transition:transform .1s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform=''">  
        <div style="font-size:11px;font-weight:${c.isToday?"700":"400"};color:${c.isToday?"#60a5fa":c.count>0?"#9ca3af":c.hasNote?"#6b7280":"#374151"}">${c.day}</div>  
        ${c.pnl!==null?`<div style="font-size:10px;color:${c.pnl>=0?"#00c07a":"#ef4444"};font-weight:600;margin-top:2px;">${c.pnl>=0?"+":"-"}$${Math.abs(c.pnl).toFixed(0)}</div>`:""}  
        ${c.count>0?`<div style="font-size:9px;color:#4b5563;margin-top:1px;">${c.count}T</div>`:""}  
        ${c.hasNote&&c.count===0?`<div style="font-size:9px;color:#3b82f6;margin-top:2px;">冒聼聯聺</div>`:""}  
      </div>`;  
    }).join("")}  
    </div>`);  
  }  
  
  return `  
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;">  
    ${[["P&L",f$(mPnl),mPnl>=0?"#00c07a":"#ef4444"],["Win Rate",mTrades.length?`${mWr}%`:"芒聙聰","#60a5fa"],["Trades",mTrades.length,"#e5e7eb"],["Profit Factor",mPf,"#f59e0b"],["Avg R:R",mAvgRR,"#8b5cf6"]].map(([l,v,c])=>`  
    <div class="stat-card"><div style="font-size:9px;color:#4b5563;margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em">${l}</div><div style="font-size:20px;font-weight:700;color:${c}">${v}</div></div>`).join("")}  
  </div>  
  <div class="sc" style="margin-bottom:16px;">  
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">  
      <button onclick="navMonth(-1)" style="background:#111827;border:1px solid #1e2635;border-radius:8px;color:#9ca3af;cursor:pointer;font-size:16px;padding:6px 14px;font-family:'Azeret Mono',monospace;">芒聙鹿</button>  
      <div style="text-align:center;">  
        <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#f9fafb;">${MONTH_NAMES[calMonth]} ${calYear}</div>  
        <div style="font-size:11px;margin-top:3px;color:${mPnl>=0?"#00c07a":"#ef4444"};font-weight:600;">${mTrades.length>0?`${f$(mPnl)} 脗路 ${mTrades.length} trades 脗路 ${mWr}% WR`:"No trades this month"}</div>  
      </div>  
      <div style="display:flex;gap:6px;">  
        ${!isCurrentMonth?`<button onclick="calYear=${now.getFullYear()};calMonth=${now.getMonth()};renderContent()" style="background:#111827;border:1px solid #1e2635;border-radius:7px;color:#6b7280;cursor:pointer;font-size:11px;padding:6px 12px;font-family:'Azeret Mono',monospace;">Today</button>`:""}  
        <button onclick="navMonth(1)" style="background:#111827;border:1px solid #1e2635;border-radius:8px;color:#9ca3af;cursor:pointer;font-size:16px;padding:6px 14px;font-family:'Azeret Mono',monospace;">芒聙潞</button>  
      </div>  
    </div>  
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;">  
      ${DAYS.map(d=>`<div style="text-align:center;font-size:10px;color:#374151;padding:4px 0;">${d}</div>`).join("")}

    ${calRows.join("")}  
    <div style="margin-top:8px;font-size:10px;color:#374151;">脳聹脳聴脳楼 脳垄脳聹 脳聶脳聲脳聺 脳聹脳娄脳陇脳聶脳聶脳聰 脳聭脳垄脳隆脳搂脳聬脳聲脳陋 脳聬脳聲 脳聰脳聲脳隆脳陇脳陋 脳聰脳垄脳篓脳聰</div>  
  </div>  
  <div style="font-size:10px;color:#4b5563;margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em;">脳垄脳隆脳搂脳聬脳聲脳陋 脳聬脳聴脳篓脳聲脳聽脳聲脳陋 芒聙聰 ${MONTH_NAMES[calMonth]}</div>  
  ${mTrades.length===0  
    ?`<div style="text-align:center;padding:40px 0;color:#1e2635;"><div style="font-size:36px;">冒聼聯聥</div><div style="font-size:13px;margin-top:8px;">No trades in ${MONTH_NAMES[calMonth]}</div></div>`  
    :mTrades.slice(0,6).map(renderTRowHTML).join("")}`;  
}

function renderStats(){  
  const w=wins(),l=losses(),r=wr();  
  const bm=byMonth();  
  const allPnls=allPnL();  
  const grossW=allPnls.filter(p=>p>0).reduce((a,b)=>a+b,0);  
  const grossL=Math.abs(allPnls.filter(p=>p<0).reduce((a,b)=>a+b,0));  
  const byYear=trades.reduce((acc,t)=>{  
    const y=t.date.slice(0,4);
